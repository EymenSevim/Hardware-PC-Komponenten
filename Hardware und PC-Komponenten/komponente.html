<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Komponente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

  <nav class="py-3 border-bottom bg-dark">
    <div class="container d-flex flex-wrap align-items-center justify-content-between">
      <ul class="nav ms-auto">
        <li class="nav-item">
          <a href="index.html" class="nav-link text-white">Home</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link text-white dropdown-toggle" href="#" id="komponentenDropdown">
            Komponenten
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="komponente.html?slug=cpu">CPU</a></li>
            <li><a class="dropdown-item" href="komponente.html?slug=gpu">Grafikkarte</a></li>
            <li><a class="dropdown-item" href="komponente.html?slug=ram">RAM</a></li>
            <li><a class="dropdown-item" href="komponente.html?slug=mainboard">Mainboard</a></li>
            <li><a class="dropdown-item" href="komponente.html?slug=ssd">SSD / HDD</a></li>
            <li><a class="dropdown-item" href="komponente.html?slug=psu">Netzteil</a></li>
            <li><a class="dropdown-item" href="komponente.html?slug=cooler">Kühler</a></li>
            <li><a class="dropdown-item" href="komponente.html?slug=case">Gehäuse</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a href="Aufbau.html" class="nav-link text-white">Aufbau</a>
        </li>
        <li class="nav-item">
          <a href="datenfluss.html" class="nav-link text-white">Datenfluss</a>
        </li>
        <li class="nav-item">
          <a href="quiz.html" class="nav-link text-white">Quiz</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Header – wird per JS befüllt -->
  <div class="bg-dark text-white py-5">
    <div class="container">
      <h1 id="seiten-titel" class="display-4 fw-bold">Laden...</h1>
      <p id="seiten-untertitel" class="lead"></p>
    </div>
  </div>

  <!-- Inhalt – wird per JS befüllt -->
  <div class="container my-5">
    <div id="inhalt-container" class="section-box">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted">Inhalte werden geladen...</p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-wave">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#1a1d20"
          d="M0,64L80,69.3C160,75,320,85,480,80C640,75,800,53,960,48C1120,43,1280,53,1360,58.7L1440,64L1440,120L1360,120C1280,120,1120,120,960,120C800,120,640,120,480,120C320,120,160,120,80,120L0,120Z">
        </path>
      </svg>
    </div>
    <div class="footer-content">
      <div class="container">
        <div class="col-md-12 text-center">
          <p class="text-white-50 mb-0">© 2026 Schulprojekt Hardware-Guide</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = 'http://localhost:3000/komponenten';

    // slug aus der URL lesen, z.B. komponente.html?slug=cpu  →  "cpu"
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    async function komponenteLaden() {
      // Kein slug in der URL?
      if (!slug) {
        zeigeFehlermeldung('Keine Komponente angegeben. Bitte wähle eine aus dem Menü.');
        return;
      }

      try {
        const response = await fetch(`${API_URL}?slug=${slug}`);

        if (!response.ok) throw new Error('Server nicht erreichbar');

        const daten = await response.json();

        if (daten.length === 0) {
          zeigeFehlermeldung(`Komponente "${slug}" wurde nicht gefunden.`);
          return;
        }

        seitenAufbauen(daten[0]);

      } catch (fehler) {
        zeigeFehlermeldung(`
          <strong>⚠️ JSON-Server nicht erreichbar</strong><br>
          Bitte starte den Server im Terminal:<br>
          <code>json-server --watch db.json</code><br>
          <span class="text-muted">Dann lade diese Seite neu.</span>
        `);
      }
    }

    function seitenAufbauen(komponente) {
      // Seitentitel & Browser-Tab
      document.title = komponente.titel;
      document.getElementById('seiten-titel').textContent = komponente.titel;
      document.getElementById('seiten-untertitel').textContent = komponente.untertitel;

      // Abschnitte generieren
      const abschnitteHTML = komponente.abschnitte.map((abschnitt, index) => {
        // Erster Abschnitt bekommt das Bild daneben (falls vorhanden)
        if (index === 0 && komponente.bild) {
          return `
            <div class="row align-items-start mb-5">
              <div class="col-md-7">
                <h2 class="fw-bold mb-3 border-bottom pb-2">${abschnitt.titel}</h2>
                <p>${abschnitt.inhalt}</p>
              </div>
              <div class="col-md-5 text-center">
                <img src="${komponente.bild}" class="img-fluid rounded shadow-sm" alt="${komponente.titel}" style="max-height: 260px; object-fit: contain;">
              </div>
            </div>
          `;
        }

        // Alle weiteren Abschnitte normal
        return `
          <h3 class="fw-bold mt-5 mb-3 border-bottom pb-2">${abschnitt.titel}</h3>
          <p>${abschnitt.inhalt}</p>
        `;
      }).join('');

      document.getElementById('inhalt-container').innerHTML = abschnitteHTML;
    }

    function zeigeFehlermeldung(text) {
      document.getElementById('seiten-titel').textContent = 'Fehler';
      document.getElementById('inhalt-container').innerHTML = `
        <div class="alert alert-danger">${text}</div>
      `;
    }

    komponenteLaden();
  </script>

</body>
</html>
